on:
  workflow_dispatch: ~
  push: ~
  pull_request: ~

permissions:
  contents: read

jobs:
  build-nix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: 'system-features = benchmark big-parallel nixos-test uid-range kvm'
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          name: defused
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run nix checks
        run: |
          nix flake check --option keep-going true
